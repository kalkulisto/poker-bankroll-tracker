services:
  - type: web
    name: poker-bankroll-tracker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_NAME
        value: Andreas
      - key: ADMIN_PIN
        sync: false
      - key: GOOGLE_CREDENTIALS
        sync: false
